baseURL = 'https://zhoupenglong.com/'
languageCode = 'zh-cn'
title = '鹏龙的学习之路'
theme = 'PaperMod'

[params]
    # 网站基本描述
    description = "Less, but better."
    # ... 其他设置 ...
    assets.favicon = "/favicon.png"
    copyright = "2026 鹏龙的学习之路 · All Rights Reserved."
    
    # --- 首页 Profile 模式 ---
    [params.profileMode]
        enabled = true
        title = "你好，我是周鹏龙。"
        subtitle = "Less, but better. | 记录教育观察、个人成长与愿意分享的一切。"
        imageUrl = "/images/logo.png"
        imageTitle = "Logo"
        imageWidth = 150


        [[params.profileMode.buttons]]
            name = "📚 阅读文章"
            url = "posts"
            
        [[params.profileMode.buttons]]
            name = "🧑‍💻 关于我"
            url = "about"

    # --- 社交图标 (注意：这个必须紧跟在 [params] 下，不能缩进在 profileMode 里) ---
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/airdonkey" # 建议填你真实的 GitHub 链接
    
    [[params.socialIcons]]
        name = "wechat"
        url = "posts/wechat-qr"

# 这里可以放菜单设置
[menu]
    [[menu.main]]
        name = "文章"
        url = "posts"
        weight = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true