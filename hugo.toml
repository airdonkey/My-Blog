baseURL = 'https://zhoupenglong.com/'
languageCode = 'zh-cn'
title = 'ZHOU PENGLONG | 周鹏龙'
theme = 'PaperMod'
copyright = "Zhou Penglong. All Rights Reserved."

[params]
    description = "探索教育创新的边界，分享跨文化视角的思考与沉淀。"

    # --- 0. 浏览器标签LOGO ---
    [params.assets]
        favicon = "/favicon.ico"
        apple_touch_icon = "/apple-touch-icon.png"

    # --- 1. 社交图标 (放在最前面，确保全局生效) ---
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/airdonkey" 
    
    [[params.socialIcons]]
        name = "wechat"
        url = "/posts/wechat-qr/"

    # --- 2. 左上角文字 Logo ---
    [params.label]
        text = "ZHOU PENGLONG ."

    # --- 3. 首页 Profile 模式 ---
    [params.profileMode]
        enabled = true
        title = "你好，我是周鹏龙。"
        subtitle = "记录教育观察、个人成长及热爱的一切。"
        imageUrl = "/images/logo.png"
        imageTitle = "Logo"
        imageWidth = 150  # 宽度由 TOML 控制

        [[params.profileMode.buttons]]
            name = "📚 阅读文章"
            url = "/posts/"
            
        [[params.profileMode.buttons]]
            name = "🧑‍💻 关于我"
            url = "/about/"

# --- 4. 菜单配置 (必须在 [params] 块之外) ---
[menu]
    [[menu.main]]
        name = "文章"
        url = "/posts/"
        weight = 10
    [[menu.main]]
        name = "关于"
        url = "/about/"
        weight = 20

# --- 5. 其他设置 ---
[markup.goldmark.renderer]
    unsafe = true