baseURL = 'https://zhoupenglong.com/'
languageCode = 'zh-cn'
# 这是显示在浏览器标签页上的完整名字
title = 'ZHOU PENGLONG | 周鹏龙' 
theme = 'PaperMod'
# ✅ 【修复1】版权声明必须放在最顶层！
copyright = "Zhou Penglong. All Rights Reserved."

[params]
    description = "探索教育创新的边界，分享跨文化视角的思考与沉淀。"

# --- 浏览器标签页 Logo (Favicon) 设置 ---
[params.assets]
    favicon = "/favicon.png"
    favicon16x16 = "/favicon.png"
    favicon32x32 = "/favicon.png"
    apple_touch_icon = "/favicon.png"

# --- 极简左上角 Logo 设置 ---
[params.label]
    text = "ZHOU PENGLONG ." 

# --- 首页 Profile 模式 ---
[params.profileMode]
    enabled = true
    title = "你好，我是周鹏龙。"
    subtitle = "记录教育观察、个人成长及热爱的一切。"
    imageUrl = "/images/logo.png"
    imageTitle = "Logo"
    imageWidth = 150
    # ✅ 【修复2】加上这一行强制高度，Logo 绝对不会再拉伸变形！
    imageHeight = 150 

    [[params.profileMode.buttons]]
        name = "📚 阅读文章"
        url = "/posts/"
        
    [[params.profileMode.buttons]]
        name = "🧑‍💻 关于我"
        url = "/about/"

# --- 社交图标 ---
[[params.socialIcons]]
    name = "github"
    url = "https://github.com/airdonkey" 
    
[[params.socialIcons]]
    name = "wechat"
    url = "/posts/wechat-qr/"

[menu]
    [[menu.main]]
        name = "文章"
        url = "/posts/"
        weight = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true