<div id="travel-map" style="width: 100%; height: 500px; border-radius: 8px; z-index: 1; margin: 2em 0;"></div>

<script>
    var map = L.map('travel-map').setView([15.0, 110.0], 3);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    
    var locations = [{"lat":-40.9006,"linkText":"Read post \u0026rarr;","lng":174.886,"name":"New Zealand","url":"/en/categories/new-zealand/"},{"lat":41.3775,"linkText":"Read post \u0026rarr;","lng":64.5853,"name":"Uzbekistan","url":"/en/categories/uzbekistan/"}];

    if (locations) {
        locations.forEach(function(loc) {
            var marker = L.marker([loc.lat, loc.lng]).addTo(map);
            
            var popupContent = `<div style="text-align:center; font-family:var(--primary);">
                                    <b>${loc.name}</b><br>
                                    <a href="${loc.url}" style="color:#0078D7; text-decoration:none; margin-top:5px; display:inline-block;">${loc.linkText}</a>
                                </div>`;
            marker.bindPopup(popupContent);
        });
    }
</script>

<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
